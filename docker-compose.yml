services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-smart_scanner}"
      MYSQL_USER: "${MYSQL_USER:-smart_scanner}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-smart_scanner_password}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-smart_scanner_root_password}"
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3000}:${BACKEND_PORT:-3000}"
    environment:
      NODE_ENV: "${NODE_ENV:-development}"
      BACKEND_HOST: "0.0.0.0"
      BACKEND_PORT: "${BACKEND_PORT:-3000}"
      DATABASE_URL: "mysql://${MYSQL_USER:-smart_scanner}:${MYSQL_PASSWORD:-smart_scanner_password}@mysql:3306/${MYSQL_DATABASE:-smart_scanner}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_RECEIPT_EXTRACTION_MODEL: "${OPENAI_RECEIPT_EXTRACTION_MODEL:-gpt-5-mini}"
      UPLOADS_DIR: "${UPLOADS_DIR:-/uploads}"
    volumes:
      - uploads_data:/uploads

volumes:
  mysql_data:
  uploads_data:
